<!DOCTYPE html>
<html>

<head>
<title>Government Services</title>
<link rel="stylesheet" href="style.css">

<style>

.services-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:40px;
}

.service-card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:12px;
width:250px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.service-card h3{
color:#ffd60a;
}

.apply-btn{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#ff4d6d;
color:white;
text-decoration:none;
border-radius:20px;
}

.search-bar{
text-align:center;
margin-top:30px;
}

.search-bar input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<h1 style="text-align:center">Government Services</h1>

<div class="search-bar">
<input type="text" id="search" placeholder="Search services..." onkeyup="searchService()">
</div>

<div class="services-container" id="services"></div>

<script>

let allServices = []

fetch("/services")
.then(res => res.json())
.then(data => {

allServices = data
displayServices(data)

})

function displayServices(services){

let container = document.getElementById("services")
container.innerHTML = ""

services.forEach(service =>{

let card = document.createElement("div")
card.className="service-card"

card.innerHTML = `
<h3>${service.title}</h3>
<p>${service.department}</p>
<p>${service.description}</p>
<a class="apply-btn" href="apply.html">Apply</a>
`

container.appendChild(card)

})

}

function searchService(){

let keyword = document.getElementById("search").value.toLowerCase()

let filtered = allServices.filter(service =>
service.title.toLowerCase().includes(keyword)
)

displayServices(filtered)

}

</script>

</body>
